<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyWheels - PokeRogue</title>

    <!-- Firebase SDK -->
    <script
      type="module"
      src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
    ></script>
    <script
      type="module"
      src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    ></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Roboto", sans-serif;
        color: #fff;
        background-color: #1a1a1a;
        overflow-x: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      :root {
        --fw-dark: #1a1a1a;
        --fw-darker: #0a0a0a;
        --fw-gold: #d4af37;
        --fw-gold-dark: #b8941f;
        --fw-gold-light: #e6c158;
        --fw-beige: #f5e8c8;
        --fw-beige-dark: #e8d9b0;
        --fw-beige-light: #faf3e0;
        --fw-gray: #333333;
        --fw-white: #ffffff;
        --fw-black: #000000;
        --fw-yellow: #ffd700;
        --fw-amber: #ffbf00;
      }

      header {
        background: linear-gradient(
          135deg,
          var(--fw-dark) 0%,
          var(--fw-gray) 100%
        );
        position: relative;
        width: 100%;
        z-index: 1000;
        padding: 1rem 0;
        border-bottom: 3px solid var(--fw-gold);
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        transition: all 0.3s ease;
      }

      header.scrolled {
        background: linear-gradient(
          135deg,
          rgba(26, 26, 26, 0.98) 0%,
          rgba(51, 51, 51, 0.98) 100%
        );
        box-shadow: 0 5px 25px rgba(212, 175, 55, 0.3);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 30px;
      }

      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .logo-container {
        display: flex;
        align-items: center;
        padding: 8px 15px;
        background: rgba(212, 175, 55, 0.1);
        border: 2px solid var(--fw-gold);
        border-radius: 10px;
        animation: logoGlow 2s infinite alternate;
        transition: all 0.3s ease;
      }

      @keyframes logoGlow {
        0% {
          box-shadow:
            0 0 5px var(--fw-gold),
            0 0 10px rgba(212, 175, 55, 0.3);
        }
        100% {
          box-shadow:
            0 0 15px var(--fw-gold),
            0 0 25px rgba(212, 175, 55, 0.5);
        }
      }

      .logo-container:hover {
        transform: translateY(-2px);
        border-color: var(--fw-gold-light);
      }

      .logo-container img {
        height: 60px;
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        transition: transform 0.3s ease;
      }

      .logo-container:hover img {
        transform: scale(1.05);
      }

      .logo-text-container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        margin-left: 15px;
      }

      .logo-text {
        font-family: "Orbitron", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: linear-gradient(
          135deg,
          var(--fw-beige-light),
          var(--fw-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }

      .logo-subtitle {
        font-family: "Roboto", sans-serif;
        font-size: 0.9rem;
        color: var(--fw-gold);
        font-weight: 500;
        letter-spacing: 1px;
        text-align: center;
        width: 100%;
        margin-top: 2px;
        text-transform: uppercase;
      }

      nav {
        display: flex;
        align-items: center;
      }

      nav ul {
        display: flex;
        list-style: none;
        gap: 5px;
      }

      nav a {
        text-decoration: none;
        font-family: "Orbitron", sans-serif;
        font-weight: 600;
        font-size: 1rem;
        padding: 12px 20px;
        border-radius: 10px;
        transition: all 0.3s ease;
        border: 2px solid var(--fw-beige);
        position: relative;
        overflow: hidden;
        background: rgba(245, 232, 200, 0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 90px;
      }

      .nav-icon {
        font-size: 1.2rem;
        margin-bottom: 5px;
        color: var(--fw-gold);
        display: block;
        filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
      }

      .nav-text {
        font-size: 0.9rem;
        display: block;
        background: linear-gradient(
          135deg,
          var(--fw-beige-light),
          var(--fw-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      nav a:hover {
        border: 2px solid var(--fw-gold);
        background: rgba(212, 175, 55, 0.15);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        transform: translateY(-2px);
      }

      nav a::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(
          45deg,
          var(--fw-gold),
          transparent,
          var(--fw-gold)
        );
        z-index: -1;
        opacity: 0;
        transition: opacity 0.3s ease;
        border-radius: 12px;
      }

      nav a:hover::before {
        opacity: 0.4;
      }

      .burger {
        display: none;
        flex-direction: column;
        cursor: pointer;
        background: rgba(212, 175, 55, 0.1);
        padding: 10px;
        border-radius: 10px;
        border: 2px solid var(--fw-gold);
        margin-left: 15px;
        animation: burgerGlow 2s infinite alternate;
      }

      @keyframes burgerGlow {
        0% {
          box-shadow:
            0 0 5px var(--fw-gold),
            0 0 10px rgba(212, 175, 55, 0.3);
        }
        100% {
          box-shadow:
            0 0 10px var(--fw-gold),
            0 0 20px rgba(212, 175, 55, 0.5);
        }
      }

      .burger span {
        width: 25px;
        height: 3px;
        background: var(--fw-gold);
        margin: 3px 0;
        transition: 0.3s;
        border-radius: 2px;
      }

      .burger.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
      }

      .burger.active span:nth-child(2) {
        opacity: 0;
      }

      .burger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -6px);
      }

      .main-content {
        flex: 1;
        position: relative;
        z-index: 2;
        background: #000;
        overflow: hidden;
      }

      .iframe-container {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #gameIframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #000;
      }

      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, var(--fw-darker), var(--fw-dark));
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: opacity 0.5s ease;
      }

      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(212, 175, 55, 0.3);
        border-top: 4px solid var(--fw-gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-family: "Orbitron", sans-serif;
        font-size: 1.2rem;
        color: var(--fw-beige);
        text-transform: uppercase;
        letter-spacing: 2px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @media (max-width: 768px) {
        nav ul {
          display: none;
          position: fixed;
          top: 100px;
          left: 0;
          width: 100%;
          background: linear-gradient(
            135deg,
            var(--fw-dark) 0%,
            var(--fw-gray) 100%
          );
          flex-direction: column;
          padding: 20px;
          text-align: center;
          gap: 10px;
          border-top: 2px solid var(--fw-gold);
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
          z-index: 999;
        }

        nav ul.active {
          display: flex;
        }

        nav a {
          padding: 15px;
          min-width: auto;
          width: 100%;
          max-width: 300px;
          margin: 0 auto;
          flex-direction: row;
          justify-content: center;
          gap: 10px;
          border-radius: 8px;
        }

        .nav-icon {
          margin-bottom: 0;
          font-size: 1.1rem;
        }

        .nav-text {
          font-size: 0.95rem;
        }

        .burger {
          display: flex;
        }

        .logo-text {
          font-size: 1.5rem;
        }

        .logo-container img {
          height: 50px;
        }
      }

      @media (max-width: 576px) {
        .logo-text {
          font-size: 1.2rem;
        }

        .logo-container img {
          height: 40px;
        }

        .container {
          padding: 0 15px;
        }
      }
    </style>
  </head>
  <body>
    <header id="header">
      <div class="container">
        <div class="nav-container">
          <div class="logo-container">
            <img
              src="assets/logo/logo.png"
              alt="FlyWheels Logo"
              id="headerLogo"
            />
            <div class="logo-text-container">
              <div class="logo-text">FLYWHEELS</div>
              <div class="logo-subtitle">POKEROGUE</div>
            </div>
          </div>

          <nav>
            <ul id="nav-menu">
              <li>
                <a href="index.html">
                  <span class="nav-icon"><i class="fas fa-home"></i></span>
                  <span class="nav-text">Accueil</span>
                </a>
              </li>
            </ul>

            <div class="burger" id="burger">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="iframe-container">
        <div class="loading-overlay" id="loadingOverlay">
          <div class="loading-spinner"></div>
          <div class="loading-text">Chargement de PokeRogue...</div>
        </div>
        <iframe
          id="gameIframe"
          src="https://pokerogue.net/"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        ></iframe>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCcIopLaEJQGqSx6S6t-IoXAmT4ghRoYo8",
        authDomain: "flywheels-eb854.firebaseapp.com",
        projectId: "flywheels-eb854",
        storageBucket: "flywheels-eb854.firebasestorage.app",
        messagingSenderId: "644938564681",
        appId: "1:644938564681:web:03f18ec31ee5d87a2feb98",
        measurementId: "G-BM6XVDGNY0",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const burger = document.getElementById("burger");
      const navMenu = document.getElementById("nav-menu");
      const header = document.getElementById("header");
      const iframe = document.getElementById("gameIframe");
      const loadingOverlay = document.getElementById("loadingOverlay");

      // ========== GESTION DU LOGO ==========
      function initLogoListener() {
        const siteRef = doc(db, "site", "config");

        onSnapshot(
          siteRef,
          (doc) => {
            if (doc.exists()) {
              const data = doc.data();
              const headerLogo = document.getElementById("headerLogo");

              if (!headerLogo) return;

              if (data.logo) {
                headerLogo.src = data.logo;
              } else if (data.seasonalLogo && data.seasonalLogo !== "default") {
                const logoMap = {
                  saintvalentin: "logo2.png",
                  poisson: "logo3.png",
                  paques: "logo4.png",
                  ete: "logo5.png",
                  usa: "logo6.png",
                  octobrerose: "logo7.png",
                  halloween: "logo8.png",
                  noel: "logo9.png",
                };
                const logoFile = logoMap[data.seasonalLogo] || "logo.png";
                headerLogo.src = `assets/logo/${logoFile}`;
              } else {
                headerLogo.src = "assets/logo/logo.png";
              }
            }
          },
          (error) => {
            console.error("Erreur écoute logo:", error);
          },
        );
      }

      // ========== GESTION DU CHARGEMENT IFRAME ==========
      iframe.addEventListener("load", () => {
        setTimeout(() => {
          loadingOverlay.classList.add("hidden");
        }, 500);
      });

      // ========== MENU BURGER ==========
      burger.addEventListener("click", () => {
        navMenu.classList.toggle("active");
        burger.classList.toggle("active");
      });

      document.querySelectorAll("#nav-menu a").forEach((link) => {
        link.addEventListener("click", () => {
          navMenu.classList.remove("active");
          burger.classList.remove("active");
        });
      });

      // ========== GESTION DU SCROLL ==========
      window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      });

      // ========== INITIALISATION ==========
      document.addEventListener("DOMContentLoaded", () => {
        initLogoListener();

        // Animation d'entrée
        const header_ = document.querySelector("header");
        header_.style.opacity = "0";
        header_.style.transform = "translateY(-20px)";
        header_.style.transition = "all 0.6s ease";

        setTimeout(() => {
          header_.style.opacity = "1";
          header_.style.transform = "translateY(0)";
        }, 200);
      });
    </script>
  </body>
</html>
