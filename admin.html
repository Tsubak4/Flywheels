<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fly Wheels - FlashFA</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --fw-dark: #1a1a1a;
        --fw-darker: #0a0a0a;
        --fw-gold: #d4af37;
        --fw-gold-dark: #b8941f;
        --fw-gold-light: #e6c158;
        --fw-beige: #f5e8c8;
        --fw-beige-dark: #e8d9b0;
        --fw-beige-light: #faf3e0;
        --fw-gray: #333333;
        --fw-white: #ffffff;
        --fw-black: #000000;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Roboto", sans-serif;
        color: var(--fw-beige);
        background-color: var(--fw-dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          var(--fw-darker) 0%,
          var(--fw-dark) 100%
        );
        padding: 20px;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 20% 80%,
            rgba(212, 175, 55, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(212, 175, 55, 0.05) 0%,
            transparent 50%
          );
        z-index: -1;
        pointer-events: none;
      }

      .back-arrow {
        position: absolute;
        top: 30px;
        left: 30px;
        background: rgba(212, 175, 55, 0.1);
        border: 2px solid var(--fw-gold);
        border-radius: 10px;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        animation: arrowGlow 2s infinite alternate;
        z-index: 1000;
      }

      @keyframes arrowGlow {
        0% {
          box-shadow:
            0 0 10px var(--fw-gold),
            0 0 20px rgba(212, 175, 55, 0.3);
        }
        100% {
          box-shadow:
            0 0 20px var(--fw-gold),
            0 0 40px rgba(212, 175, 55, 0.5);
        }
      }

      .back-arrow:hover {
        transform: translateX(-5px);
        background: rgba(212, 175, 55, 0.2);
        box-shadow:
          0 0 30px var(--fw-gold),
          0 0 50px rgba(212, 175, 55, 0.4);
      }

      .back-arrow i {
        font-size: 1.8rem;
        color: var(--fw-beige-light);
        text-shadow: 0 0 10px var(--fw-gold);
      }

      .login-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 400px;
        padding: 30px;
        background: linear-gradient(135deg, var(--fw-darker), var(--fw-gray));
        border: 3px solid var(--fw-gold);
        border-radius: 15px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.7),
          0 0 30px rgba(212, 175, 55, 0.4),
          0 0 50px rgba(212, 175, 55, 0.3);
        animation: containerGlow 3s infinite alternate;
      }

      @keyframes containerGlow {
        0% {
          box-shadow:
            0 20px 40px rgba(0, 0, 0, 0.7),
            0 0 30px rgba(212, 175, 55, 0.4),
            0 0 50px rgba(212, 175, 55, 0.3);
        }
        100% {
          box-shadow:
            0 20px 40px rgba(0, 0, 0, 0.7),
            0 0 40px rgba(212, 175, 55, 0.7),
            0 0 60px rgba(212, 175, 55, 0.5);
        }
      }

      .title {
        font-family: "Orbitron", sans-serif;
        font-size: 2rem;
        color: var(--fw-beige-light);
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
        text-shadow:
          0 0 10px rgba(212, 175, 55, 0.8),
          0 0 20px rgba(212, 175, 55, 0.5);
        background: linear-gradient(
          to bottom,
          var(--fw-beige-light) 0%,
          var(--fw-beige) 50%,
          var(--fw-beige-dark) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: titleFlicker 4s infinite alternate;
        position: relative;
      }

      @keyframes titleFlicker {
        0%,
        19%,
        21%,
        23%,
        25%,
        54%,
        56%,
        100% {
          text-shadow:
            0 0 10px rgba(212, 175, 55, 0.8),
            0 0 20px rgba(212, 175, 55, 0.5);
          opacity: 1;
        }
        20%,
        24%,
        55% {
          text-shadow:
            0 0 5px rgba(212, 175, 55, 0.5),
            0 0 10px rgba(212, 175, 55, 0.2);
          opacity: 0.8;
        }
      }

      .title::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--fw-gold),
          transparent
        );
        border-radius: 2px;
        box-shadow: 0 0 10px var(--fw-gold);
        animation: linePulse 2s infinite alternate;
      }

      @keyframes linePulse {
        0% {
          width: 45%;
          opacity: 0.7;
          box-shadow: 0 0 10px var(--fw-gold);
        }
        100% {
          width: 55%;
          opacity: 1;
          box-shadow:
            0 0 20px var(--fw-gold),
            0 0 30px rgba(212, 175, 55, 0.5);
        }
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-group label {
        display: block;
        font-family: "Orbitron", sans-serif;
        color: var(--fw-gold);
        margin-bottom: 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
      }

      .input-container {
        position: relative;
      }

      .input-container i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--fw-gold);
        font-size: 1.1rem;
        text-shadow: 0 0 5px var(--fw-gold);
        z-index: 2;
      }

      .input-container input {
        width: 100%;
        padding: 12px 12px 12px 40px;
        background: rgba(26, 26, 26, 0.8);
        border: 2px solid var(--fw-beige);
        border-radius: 8px;
        color: var(--fw-beige-light);
        font-size: 0.9rem;
        font-family: "Roboto", sans-serif;
        transition: all 0.3s ease;
        outline: none;
        text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
      }

      .input-container input:focus {
        border-color: var(--fw-gold);
        background: rgba(26, 26, 26, 0.9);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
      }

      .input-container input::placeholder {
        color: rgba(245, 232, 200, 0.5);
        text-shadow: 0 0 3px rgba(212, 175, 55, 0.3);
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: rgba(212, 175, 55, 0.1);
        border: 2px solid var(--fw-gold);
        border-radius: 8px;
        color: var(--fw-beige-light);
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-shadow: 0 0 10px var(--fw-gold);
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }

      .btn-login:hover {
        background: rgba(212, 175, 55, 0.2);
        box-shadow:
          0 0 25px var(--fw-gold),
          0 0 40px rgba(212, 175, 55, 0.3);
        transform: translateY(-2px);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(212, 175, 55, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-login:hover::before {
        left: 100%;
      }

      .btn-login:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-login:disabled:hover {
        background: rgba(212, 175, 55, 0.1);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        transform: none;
      }

      .message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-family: "Roboto", sans-serif;
        font-size: 0.9rem;
        display: none;
        border: 2px solid;
      }

      .message.success {
        display: block;
        background: rgba(26, 40, 0, 0.3);
        border-color: var(--fw-gold);
        color: var(--fw-beige-light);
        text-shadow: 0 0 5px var(--fw-gold);
      }

      .message.error {
        display: block;
        background: rgba(40, 0, 0, 0.3);
        border-color: #ff4444;
        color: #ff9999;
        text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
      }

      .loading {
        display: none;
        text-align: center;
        margin-top: 15px;
      }

      .loading-spinner {
        display: inline-block;
        width: 25px;
        height: 25px;
        border: 2px solid rgba(212, 175, 55, 0.3);
        border-radius: 50%;
        border-top-color: var(--fw-gold);
        animation: spin 1s ease-in-out infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .footer-info {
        margin-top: 25px;
        text-align: center;
        font-size: 0.8rem;
        color: rgba(245, 232, 200, 0.7);
        text-shadow: 0 0 3px rgba(212, 175, 55, 0.5);
      }

      .footer-info p {
        margin: 3px 0;
        line-height: 1.3;
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }

        .back-arrow {
          top: 20px;
          left: 20px;
          width: 50px;
          height: 50px;
        }

        .back-arrow i {
          font-size: 1.5rem;
        }

        .login-container {
          padding: 25px 20px;
          max-width: 350px;
        }

        .title {
          font-size: 1.8rem;
          margin-bottom: 25px;
        }

        .title::after {
          width: 50%;
        }

        .input-container input {
          padding: 10px 10px 10px 35px;
          font-size: 0.85rem;
        }

        .btn-login {
          padding: 12px;
          font-size: 0.9rem;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .back-arrow {
          top: 15px;
          left: 15px;
          width: 45px;
          height: 45px;
        }

        .login-container {
          padding: 20px 15px;
          max-width: 320px;
        }

        .title {
          font-size: 1.6rem;
          margin-bottom: 20px;
        }

        .title::after {
          width: 50%;
          height: 2px;
        }

        .form-group label {
          font-size: 0.85rem;
        }

        .form-group {
          margin-bottom: 15px;
        }

        .footer-info {
          margin-top: 20px;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <a href="index.html" class="back-arrow" title="Retour à l'accueil">
      <i class="fas fa-arrow-left"></i>
    </a>

    <div class="login-container">
      <h1 class="title">ADMIN</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-container">
            <i class="fas fa-user"></i>
            <input
              type="email"
              id="email"
              placeholder="admin@flywheels.com"
              required
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-container">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
              autocomplete="off"
            />
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">CONNEXION</span>
          <div class="loading" id="btnLoading">
            <div class="loading-spinner"></div>
            Connexion...
          </div>
        </button>

        <div class="message" id="message"></div>
      </form>

      <div class="footer-info">
        <p>Zone d'administration Fly Wheels Garage</p>
        <p>© 2024 Fly Wheels Garage</p>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyD1BQIb2nkGyr4m-elfZlcE88YvGG5pLaE",
        authDomain: "src-admin-e9b49.firebaseapp.com",
        databaseURL:
          "https://src-admin-e9b49-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "src-admin-e9b49",
        storageBucket: "src-admin-e9b49.firebasestorage.app",
        messagingSenderId: "42898128978",
        appId: "1:42898128978:web:c899eccb8b9aeb465d5f8b",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const btnLoading = document.getElementById("btnLoading");
      const messageDiv = document.getElementById("message");

      function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = "message " + type;
      }

      function showLoading(show) {
        if (show) {
          btnText.style.display = "none";
          btnLoading.style.display = "inline-block";
          loginBtn.disabled = true;
        } else {
          btnText.style.display = "inline";
          btnLoading.style.display = "none";
          loginBtn.disabled = false;
        }
      }

      function forceLogout() {
        auth.signOut().catch(() => {});

        emailInput.value = "";
        passwordInput.value = "";

        emailInput.focus();
      }

      window.addEventListener("load", forceLogout);

      window.addEventListener("beforeunload", function () {
        auth.signOut().catch(() => {});
      });

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showMessage("Veuillez remplir tous les champs", "error");
          return;
        }

        showLoading(true);
        showMessage("", "");

        try {
          const userCredential = await auth.signInWithEmailAndPassword(
            email,
            password,
          );

          window.lastLoginTime = Date.now();

          showMessage("Connexion réussie ! Redirection...", "success");

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 2000);
        } catch (error) {
          console.error("Erreur de connexion:", error);

          let errorMessage = "Erreur de connexion";
          switch (error.code) {
            case "auth/user-not-found":
              errorMessage = "Utilisateur non trouvé";
              break;
            case "auth/wrong-password":
              errorMessage = "Mot de passe incorrect";
              break;
            case "auth/invalid-email":
              errorMessage = "Email invalide";
              break;
            case "auth/user-disabled":
              errorMessage = "Compte désactivé";
              break;
            case "auth/too-many-requests":
              errorMessage = "Trop de tentatives. Réessayez plus tard";
              break;
            case "auth/network-request-failed":
              errorMessage = "Erreur réseau. Vérifiez votre connexion";
              break;
          }

          showMessage(errorMessage, "error");
          showLoading(false);

          passwordInput.value = "";
          passwordInput.focus();
        }
      });

      auth.onAuthStateChanged((user) => {
        if (user) {
          const currentTime = Date.now();
          if (
            !window.lastLoginTime ||
            currentTime - window.lastLoginTime > 10000
          ) {
            auth.signOut();
            forceLogout();
          }
        }
      });

      setInterval(() => {
        const title = document.querySelector(".title");
        if (Math.random() > 0.7) {
          title.style.opacity = "0.7";
          setTimeout(() => {
            title.style.opacity = "1";
          }, 50);
        }
      }, 3000);

      window.addEventListener("load", () => {
        emailInput.focus();
      });

      document.addEventListener("DOMContentLoaded", function () {
        emailInput.setAttribute("autocomplete", "new-email");
        passwordInput.setAttribute("autocomplete", "new-password");

        emailInput.value = "";
        passwordInput.value = "";

        setTimeout(() => {
          emailInput.value = "";
          passwordInput.value = "";
        }, 100);
      });

      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          forceLogout();
        }
      });

      document.addEventListener("DOMContentLoaded", function () {
        const loginContainer = document.querySelector(".login-container");
        loginContainer.style.opacity = "0";
        loginContainer.style.transform = "scale(0.9)";
        loginContainer.style.transition = "all 0.8s ease 0.2s";

        setTimeout(() => {
          loginContainer.style.opacity = "1";
          loginContainer.style.transform = "scale(1)";
        }, 200);

        const backArrow = document.querySelector(".back-arrow");
        backArrow.style.opacity = "0";
        backArrow.style.transform = "translateX(-20px)";
        backArrow.style.transition = "all 0.6s ease 0.4s";

        setTimeout(() => {
          backArrow.style.opacity = "1";
          backArrow.style.transform = "translateX(0)";
        }, 400);
      });

      document
        .querySelector(".back-arrow")
        .addEventListener("mouseenter", function () {
          this.style.animationPlayState = "paused";
        });

      document
        .querySelector(".back-arrow")
        .addEventListener("mouseleave", function () {
          this.style.animationPlayState = "running";
        });
    </script>
  </body>
</html>
